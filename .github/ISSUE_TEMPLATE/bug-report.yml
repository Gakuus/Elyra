name: Reporte de bug
description: Reportá un error o comportamiento inesperado
labels: ["bug"]
body:
  - type: textarea
    id: descripcion
    attributes:
      label: Descripción
      description: Explicá claramente qué ocurre y qué debería ocurrir.
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      description: Pasos concretos para replicar el bug.
      placeholder: |
        1. Ir a '...'
        2. Hacer clic en '...'
        3. Scrollear hasta '...'
        4. Ver el error
    validations:
      required: true
  - type: input
    id: entorno
    attributes:
      label: Entorno
      description: Navegador, SO, versión de PHP, etc.
      placeholder: "Chrome 120, Ubuntu 24.04, PHP 8.3"
  - type: textarea
    id: logs
    attributes:
      label: Logs / capturas
      description: Si aplica, pegá logs de error o screenshots.
      render: shell
  - type: checkboxes
    id: verificacion
    attributes:
      label: Verificación
      options:
        - label: Ya busqué si existe un issue similar abierto
          required: true
