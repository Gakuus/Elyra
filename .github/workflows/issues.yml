name: Crear Issue en Fallo de CI

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  issues: write

jobs:
  create-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch != github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const branch = run.head_branch;
            const sha = run.head_sha;
            const runUrl = run.html_url;
            const title = `CI falló en ${branch} — ${run.display_title || 'sin título'}`;
            const body = [
              '## Fallo en CI',
              '',
              `**Workflow:** ${run.name}`,
              `**Rama:** \`${branch}\``,
              `**Commit:** ${sha.slice(0, 7)}`,
              `**URL:** ${runUrl}`,
              '',
              '---',
              '_Issue creado automáticamente al fallar el CI._'
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure'
            });

            const alreadyOpen = issues.data.some(i =>
              i.body && i.body.includes(sha.slice(0, 7))
            );

            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure']
              });
            }
