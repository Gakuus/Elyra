name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Validar sintaxis PHP
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -exec php -l {} \;

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm ci
      - name: Lint JavaScript
        run: npx eslint "public/js/**/*.js" "src/**/*.js" --no-error-on-unmatched-pattern || true
      - name: Lint CSS
        run: npx stylelint "public/css/**/*.css" "src/**/*.css" --allow-empty-input || true
